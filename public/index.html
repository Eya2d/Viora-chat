<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Viora chat</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="قائمة المحادثات">
        <header class="topbar">
          <div class="brand">
            <span class="avatar">V</span>
            <div>
              <h1>Viora chat</h1>
              <p id="accountLabel">غير متصل</p>
            </div>
          </div>
          <button id="logoutButton" class="icon-button hidden" title="تسجيل الخروج" aria-label="تسجيل الخروج">
            <span>↪</span>
          </button>
        </header>

        <section class="auth-panel" id="authPanel">
          <div class="auth-tabs" role="tablist">
            <button class="active" data-auth-tab="login" type="button">دخول</button>
            <button data-auth-tab="register" type="button">حساب جديد</button>
          </div>

          <form id="loginForm" class="auth-form">
            <label>
              البريد أو اسم المستخدم
              <input name="identifier" autocomplete="username" required>
            </label>
            <label>
              كلمة المرور
              <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <button class="primary" type="submit">تسجيل الدخول</button>
          </form>

          <form id="registerForm" class="auth-form hidden">
            <label>
              الاسم الظاهر
              <input name="name" autocomplete="name" minlength="2" required>
            </label>
            <label>
              اسم المستخدم
              <input name="username" autocomplete="username" minlength="3" required>
            </label>
            <label>
              البريد الإلكتروني
              <input name="email" type="email" autocomplete="email" required>
            </label>
            <label>
              كلمة المرور
              <input name="password" type="password" autocomplete="new-password" minlength="6" required>
            </label>
            <button class="primary" type="submit">إنشاء حساب</button>
          </form>
          <p class="notice" id="authNotice">يُسمح بحساب واحد لكل بريد، اسم مستخدم، وجهاز.</p>
        </section>

        <section class="chat-list" id="chatList">
          <button class="chat-row active" type="button">
            <span class="avatar group">ع</span>
            <span>
              <strong>المحادثة العامة</strong>
              <small>صور، فيديو، وصوت</small>
            </span>
          </button>
        </section>
      </aside>

      <section class="conversation" aria-label="المحادثة العامة">
        <header class="conversation-header">
          <span class="avatar group">ع</span>
          <div>
            <h2>المحادثة العامة</h2>
            <p id="statusLine">سجّل الدخول لإرسال الرسائل</p>
          </div>
        </header>

        <div class="messages" id="messages" aria-live="polite"></div>

        <form class="composer" id="composer">
          <input id="mediaInput" name="media" type="file" accept="image/*,video/*,audio/*" hidden>
          <button class="tool-button" id="attachButton" type="button" title="إرفاق ملف" aria-label="إرفاق ملف">📎</button>
          <div class="message-box">
            <div id="mediaPreview" class="media-preview hidden"></div>
            <textarea id="messageInput" name="text" rows="1" placeholder="اكتب رسالة" maxlength="2000"></textarea>
          </div>
          <button class="send-button" type="submit" title="إرسال" aria-label="إرسال">➤</button>
        </form>
      </section>
    </main>

    <div class="toast hidden" id="toast" role="status"></div>
    <script src="/app.js"></script>
  </body>
</html>
